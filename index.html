<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InstaSIM</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0d0d0d;
    color: white;
}

.container {
    display: none;
    padding: 20px;
}

h1, h2 {
    text-align: center;
}

.highlight {
    background: #1f1f1f;
    padding: 15px;
    margin: 15px 0;
    border-radius: 10px;
    text-align: center;
}

button {
    width: 100%;
    padding: 15px;
    margin: 10px 0;
    border-radius: 10px;
    border: none;
    font-size: 16px;
    background: #ffcc00;
    font-weight: bold;
}

.selected {
    background: #00ff88 !important;
    color: black;
}

input {
    width: 100%;
    padding: 15px;
    margin: 10px 0;
    border-radius: 10px;
    border: none;
}

video {
    width: 100%;
    height: 100vh;
    object-fit: cover;
}

/* PLACE ORDER bottom */
.bottom-btn {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    border-radius: 0;
}

.warning {
    background: #ff3b3b;
    padding: 10px;
    border-radius: 8px;
    margin-top: 10px;
    font-size: 14px;
    text-align: center;
}
</style>
</head>

<body>

<!-- SPLASH -->
<video id="logoVideo" autoplay muted>
    <source src="logo.mp4" type="video/mp4">
</video>

<div class="container" id="main">

<h1>InstaSIM</h1>

<input id="name" placeholder="Enter Name">
<input id="number" placeholder="Enter Mobile Number">
<input id="address" placeholder="Enter Address">

<div class="highlight">Select Your Service</div>

<button onclick="chooseService('new', this)">New SIM</button>
<button onclick="chooseService('port', this)">SIM Port</button>

<div id="options"></div>

</div>

<div class="container" id="payment">

<h2>Payment</h2>
<div id="priceBox" class="highlight"></div>

<button onclick="pay()">Pay Now (UPI)</button>

<div class="highlight">OR</div>

<button onclick="cod()">Cash on Delivery</button>

<button class="bottom-btn" onclick="placeOrder()">PLACE ORDER</button>

</div>

<script>

let service="", sim="", currentSim="", targetSim="", total=0;

setTimeout(()=>{
    document.getElementById("logoVideo").style.display="none";
    document.getElementById("main").style.display="block";
},3000);

function clearSelection(){
    document.querySelectorAll("button").forEach(btn=>{
        btn.classList.remove("selected");
    });
}

function chooseService(type, el){
    clearSelection();
    el.classList.add("selected");

    service = type;
    let html="";

    if(type==="new"){
        html+=`<div class="highlight">Choose Your SIM</div>`;
        ["JIO","AIRTEL","VI","BSNL"].forEach(s=>{
            html+=`<button onclick="chooseSim('${s}', this)">${s}</button>`;
        });
    }

    if(type==="port"){
        html+=`<div class="highlight">Select Your Current SIM</div>`;
        ["JIO","AIRTEL","VI","BSNL"].forEach(s=>{
            html+=`<button onclick="chooseCurrent('${s}', this)">${s}</button>`;
        });

        html+=`<div class="highlight">Select SIM to Port Into</div>`;
        ["JIO","AIRTEL","VI","BSNL"].forEach(s=>{
            html+=`<button onclick="chooseTarget('${s}', this)">${s}</button>`;
        });

        html+=`<div class="warning">
        Your current SIM must be active with recharge and older than 90 days.
        </div>`;
    }

    document.getElementById("options").innerHTML=html;
}

function chooseSim(s, el){
    clearSelection();
    el.classList.add("selected");
    sim=s;
    goPayment();
}

function chooseCurrent(s, el){
    clearSelection();
    el.classList.add("selected");
    currentSim=s;
}

function chooseTarget(s, el){
    clearSelection();
    el.classList.add("selected");
    targetSim=s;

    if(currentSim && targetSim){
        goPayment();
    }
}

function goPayment(){

    if(service==="new"){
        total = sim==="BSNL" ? 299+99 : 399+99;
    }

    if(service==="port"){
        total = targetSim==="BSNL" ? 249+99 : 99+99;
    }

    document.getElementById("main").style.display="none";
    document.getElementById("payment").style.display="block";

    document.getElementById("priceBox").innerHTML="Total: ₹"+total;
}

function pay(){
    let upi = `upi://pay?pa=8866506842@nyes&pn=InstaSIM&am=${total}&cu=INR`;
    window.location.href = upi;
}

function cod(){
    alert("Cash on Delivery Selected");
}

function placeOrder(){

    let details = `
Name: ${name.value}
Number: ${number.value}
Address: ${address.value}
Service: ${service}
SIM: ${sim}
Current: ${currentSim}
Port To: ${targetSim}
Total: ${total}
`;

    let url="https://wa.me/919265094503?text="+encodeURIComponent(details);
    window.open(url);

    alert("🎉 Thank You! Your SIM Order is Confirmed!");
}

</script>

</body>
</html>
