<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InstaSIM</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0d0d0d;
    color: white;
}

.container {
    display: none;
    padding: 20px;
}

.center {
    text-align: center;
}

h1, h2 {
    text-align: center;
}

.highlight {
    background: #1f1f1f;
    padding: 15px;
    margin: 15px 0;
    border-radius: 10px;
    font-size: 18px;
    text-align: center;
}

button {
    width: 100%;
    padding: 15px;
    margin: 10px 0;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    background: #ffcc00;
    font-weight: bold;
}

input {
    width: 100%;
    padding: 15px;
    margin: 10px 0;
    border-radius: 10px;
    border: none;
}

video {
    width: 100%;
    height: 100vh;
    object-fit: cover;
}
</style>
</head>

<body>

<!-- SPLASH SCREEN -->
<video id="logoVideo" autoplay muted>
    <source src="logo.mp4" type="video/mp4">
</video>

<div class="container" id="main">

<h1>InstaSIM</h1>

<input type="text" id="name" placeholder="Enter Name">
<input type="text" id="number" placeholder="Enter Mobile Number">
<input type="text" id="address" placeholder="Enter Address">

<div class="highlight">Select Your Service</div>

<button onclick="selectService('new')">New SIM</button>
<button onclick="selectService('port')">SIM Port</button>

<div id="options"></div>

<button onclick="nextStep()">NEXT</button>

</div>

<div class="container" id="payment">

<h2>Payment</h2>
<div id="priceBox" class="highlight"></div>

<button onclick="pay('phonepe')">PhonePe</button>
<button onclick="pay('gpay')">Google Pay</button>
<button onclick="pay('paytm')">Paytm</button>

<div class="highlight">OR</div>

<button onclick="pay('cod')">Cash on Delivery</button>

<button onclick="placeOrder()">PLACE ORDER</button>

</div>

<script>

let service = "";
let sim = "";
let currentSim = "";
let targetSim = "";
let total = 0;

setTimeout(() => {
    document.getElementById("logoVideo").style.display = "none";
    document.getElementById("main").style.display = "block";
}, 3000);

function selectService(type) {
    service = type;
    let html = "";

    if(type === "new"){
        html += `<div class="highlight">Choose Your SIM</div>`;
        ["JIO","AIRTEL","VI","BSNL"].forEach(s=>{
            html += `<button onclick="sim='${s}'">${s}</button>`;
        });
    }

    if(type === "port"){
        html += `<div class="highlight">Select Your Current SIM</div>`;
        ["JIO","AIRTEL","VI","BSNL"].forEach(s=>{
            html += `<button onclick="currentSim='${s}'">${s}</button>`;
        });

        html += `<div class="highlight">Select SIM to Port Into</div>`;
        ["JIO","AIRTEL","VI","BSNL"].forEach(s=>{
            html += `<button onclick="targetSim='${s}'">${s}</button>`;
        });
    }

    document.getElementById("options").innerHTML = html;
}

function nextStep(){

    if(service === "new"){
        if(sim === "BSNL") total = 299 + 99;
        else total = 399 + 99;
    }

    if(service === "port"){
        if(targetSim === "BSNL") total = 249 + 99;
        else total = 99 + 99;
    }

    document.getElementById("main").style.display = "none";
    document.getElementById("payment").style.display = "block";

    document.getElementById("priceBox").innerHTML = "Total: ₹" + total;
}

function pay(type){

    if(type === "cod"){
        alert("Cash on Delivery Selected");
        return;
    }

    let upi = "upi://pay?pa=8866506842@nyes&pn=InstaSIM&am="+total;

    window.location.href = upi;
}

function placeOrder(){

    let details = `
Name: ${document.getElementById("name").value}
Number: ${document.getElementById("number").value}
Address: ${document.getElementById("address").value}

Service: ${service}
SIM: ${sim}
Current: ${currentSim}
Port To: ${targetSim}
Total: ${total}
`;

    // WhatsApp send
    let url = "https://wa.me/919265094503?text=" + encodeURIComponent(details);
    window.open(url);

    alert("Thank You! Your SIM Order is Successful 🎉");
}

</script>

</body>
</html>
